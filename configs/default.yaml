# NR-CCP 2D Demo 默认配置

seed: 42

field:
  width_m: 100.0
  height_m: 60.0
  cell_size_m: 1.0
  # 禁行区 [x_min, y_min, x_max, y_max]（米，世界坐标）
  obstacles: []

risk_field:
  gaussians:
    - center: [30.0, 20.0]
      sigma: [12.0, 8.0]
      amplitude: 0.9
    - center: [70.0, 40.0]
      sigma: [10.0, 10.0]
      amplitude: 0.75
    - center: [50.0, 30.0]
      sigma: [8.0, 6.0]
      amplitude: 0.5
  normalize: true

planner:
  strip_width_m: 4.0
  waypoint_spacing_m: 2.0
  start: [2.0, 2.0]

methods:
  - uniform_boustrophedon
  - risk_aware_reordering
  - informed_strip_selection

output:
  figures_dir: outputs/figures
  results_dir: outputs/results
  dpi: 150
