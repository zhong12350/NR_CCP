# RB-CCP V1 演示配置（小样本 / 出图）

seed: 42

field:
  wkt_path: wkt/ee_field_10.wkt
  auto_cell_size: true

headland:
  width_m: 18.0

risk_field:
  headland_base: 1.0
  inner_base: 0.08
  headland_decay_m: 6.0
  auto_hotspots: true
  use_pass_count: true
  pass_count_weight: 0.25
  repeat_penalty: 0.35
  turning_penalty: 0.25
  turning_angle_deg: 45.0
  normalize: true
  uncertainty_enabled: true
  uncertainty_base: 0.03
  headland_uncertainty: 0.10
  hotspot_uncertainty: 0.08
  pass_count_uncertainty: 0.06
  uncertainty_cost_weight: 0.50
  cvar_z: 1.645
  chance_threshold: 0.60
  risk_bound_metric: cvar

planner:
  swath_width_m: 6.0
  angle_step_deg: 5.0
  min_coverage: 0.80
  waypoint_spacing_m: 2.0
  route_optimizer: 2opt
  route_2opt_passes: 3

selection:
  delta: 0.38
  lambda_weighted: 0.8
  beta_rb_ccp: 1.0
  beta_nr_ccp: 1.0

informed_sampling:
  enabled: true
  coarse_step_deg: 15.0
  fine_step_deg: 2.0
  top_k_coarse: 6
  learned_weight: 0.35
  model_path: models/informed_sampler.npz

vehicle:
  mass_kg: 3000.0
  tire_width_m: 0.35
  contact_length_m: 0.45

soil:
  moisture: 0.30

physics:
  enabled: true

methods:
  - naive
  - weighted
  - rb_ccp
  - nr_ccp
  - fields2cover

batch:
  field_glob: wkt/*.wkt
  max_fields: 10
  save_figures: true
  progress_every: 1

output:
  figures_dir: outputs/figures
  results_dir: outputs/results
  advisor_demo_dir: outputs/advisor_demo
  dpi: 150
